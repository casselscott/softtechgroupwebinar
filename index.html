<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soft Tech Group — AI Execution Framework</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Raleway:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "Raleway", sans-serif;
      }

      /* ── SHELL ── */
      .shell {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #04030a;
        position: relative;
      }

      /* ── TOP BAR ── */
      .topbar {
        height: 44px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        background: rgba(4, 3, 10, 0.96);
        border-bottom: 1px solid rgba(201, 168, 76, 0.2);
        position: relative;
        z-index: 100;
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .brand {
        font-family: "Cinzel", serif;
        font-size: 12px;
        font-weight: 600;
        color: rgba(201, 168, 76, 0.8);
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .sep {
        width: 1px;
        height: 16px;
        background: rgba(201, 168, 76, 0.25);
      }
      .deck-title {
        font-family: "Raleway", sans-serif;
        font-size: 11px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 0.06em;
      }

      .topbar-center {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        cursor: pointer;
        transition:
          background 0.25s,
          transform 0.25s;
        flex-shrink: 0;
      }
      .dot.active {
        background: #c9a84c;
        transform: scale(1.3);
      }
      .dot:hover:not(.active) {
        background: rgba(201, 168, 76, 0.5);
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .slide-counter {
        font-family: "Cinzel", serif;
        font-size: 11px;
        color: rgba(201, 168, 76, 0.65);
        letter-spacing: 0.1em;
        min-width: 52px;
        text-align: right;
      }
      .fullscreen-btn {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.4);
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .fullscreen-btn:hover {
        border-color: rgba(201, 168, 76, 0.5);
        color: rgba(201, 168, 76, 0.8);
      }
      .fullscreen-btn svg {
        width: 14px;
        height: 14px;
        fill: currentColor;
      }

      /* ── VIEWPORT ── */
      .viewport {
        flex: 1;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── SLIDE FRAME ── */
      .frame-wrap {
        position: relative;
        /* intrinsic 16:9 at 1280×720, scaled to fit viewport */
      }
      .slide-frame {
        display: block;
        width: 1280px;
        height: 720px;
        border: none;
        transform-origin: top left;
        /* scale applied via JS */
      }

      /* ── SLIDE TRANSITION OVERLAY ── */
      .transition-overlay {
        position: absolute;
        inset: 0;
        z-index: 50;
        background: #04030a;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.28s ease;
      }
      .transition-overlay.active {
        opacity: 1;
        pointer-events: all;
      }

      /* ── BOTTOM NAV ── */
      .bottombar {
        height: 52px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: rgba(4, 3, 10, 0.96);
        border-top: 1px solid rgba(201, 168, 76, 0.15);
        position: relative;
        z-index: 100;
      }
      .nav-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: "Cinzel", serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 9px 22px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.22s ease;
        border: none;
        user-select: none;
      }
      .btn-prev {
        color: rgba(255, 255, 255, 0.4);
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .btn-prev:hover:not(:disabled) {
        color: rgba(255, 255, 255, 0.75);
        border-color: rgba(255, 255, 255, 0.28);
        background: rgba(255, 255, 255, 0.05);
      }
      .btn-prev:disabled {
        opacity: 0.28;
        cursor: not-allowed;
      }
      .btn-next {
        color: #04030a;
        background: linear-gradient(135deg, #e0c050, #c9a84c, #a8861e);
        box-shadow: 0 4px 20px rgba(201, 168, 76, 0.35);
        border: 1px solid rgba(201, 168, 76, 0.6);
      }
      .btn-next:hover:not(:disabled) {
        background: linear-gradient(135deg, #edd060, #d4a843, #b8921e);
        box-shadow: 0 6px 28px rgba(201, 168, 76, 0.5);
        transform: translateY(-1px);
      }
      .btn-next:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        transform: none;
      }

      .btn-prev svg,
      .btn-next svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .btn-prev svg {
        fill: rgba(255, 255, 255, 0.4);
      }
      .btn-next svg {
        fill: #04030a;
      }

      /* slide name in middle of bottom bar */
      .slide-name {
        font-family: "Raleway", sans-serif;
        font-size: 10.5px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.28);
        letter-spacing: 0.08em;
        min-width: 220px;
        text-align: center;
      }

      /* ── PROGRESS BAR ── */
      .progress-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        background: linear-gradient(90deg, #7a5810, #f5d470, #c9a84c);
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 200;
      }

      /* keyboard hint */
      .kb-hint {
        position: absolute;
        bottom: 58px;
        right: 20px;
        z-index: 90;
        font-family: "Raleway", sans-serif;
        font-size: 9px;
        font-weight: 300;
        color: rgba(255, 255, 255, 0.18);
        letter-spacing: 0.06em;
        opacity: 1;
        transition: opacity 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <!-- TOP BAR -->
      <div class="topbar">
        <div class="topbar-left">
          <span class="brand">Soft Tech Group</span>
          <div class="sep"></div>
          <span class="deck-title">AI Execution Framework · 2026</span>
        </div>
        <div class="topbar-center" id="dots"></div>
        <div class="topbar-right">
          <span class="slide-counter" id="counter">01 / 16</span>
          <button
            class="fullscreen-btn"
            onclick="toggleFS()"
            title="Fullscreen"
          >
            <svg viewBox="0 0 20 20">
              <path
                d="M3 3h5v2H5v3H3V3zm9 0h5v5h-2V5h-3V3zM3 12h2v3h3v2H3v-5zm12 3h-3v2h5v-5h-2v3z"
              />
            </svg>
          </button>
        </div>
      </div>

      <!-- VIEWPORT -->
      <div class="viewport" id="viewport">
        <div class="frame-wrap" id="frameWrap">
          <iframe
            class="slide-frame"
            id="slideFrame"
            src=""
            scrolling="no"
          ></iframe>
          <div class="transition-overlay" id="overlay"></div>
        </div>
        <div class="progress-bar" id="progress"></div>
      </div>

      <!-- BOTTOM NAV -->
      <div class="bottombar">
        <button class="nav-btn btn-prev" id="prevBtn" onclick="go(-1)">
          <svg viewBox="0 0 16 16"><path d="M10 3L5 8l5 5V3z" /></svg>
          Previous
        </button>
        <span class="slide-name" id="slideName"></span>
        <button class="nav-btn btn-next" id="nextBtn" onclick="go(1)">
          Next Slide
          <svg viewBox="0 0 16 16"><path d="M6 3l5 5-5 5V3z" /></svg>
        </button>
      </div>
    </div>

    <span class="kb-hint" id="kbHint">← → arrow keys to navigate</span>

    <script>
      const SLIDES = [
        {
          file: "introduction_cover.html",
          name: "Cover — The AI Execution Framework",
        },
        { file: "then_now.html", name: "From Vision to Reality" },
        { file: "ai_lifecycle.html", name: "The AI Lifecycle" },
        { file: "infrastructure_layer.html", name: "Infrastructure Layer" },
        { file: "data_layer.html", name: "Data Layer" },
        { file: "model_layer.html", name: "Model Layer" },
        { file: "model_workflow.html", name: "Model Workflow" },
        {
          file: "orchestration_layer.html",
          name: "Orchestration & Agent Layer",
        },
        { file: "application_layer.html", name: "Application Layer" },
        {
          file: "application_workflow.html",
          name: "App Architecture & MCP",
        },
        {
          file: "chat_interface.html",
          name: "Chat Interface Architecture",
        },
        { file: "ai_demo.html", name: "Live AI Demos" },
        { file: "human_ai.html", name: "Human × AI Collaboration" },
        { file: "poc_to_production.html", name: "POC → Production" },
        { file: "strategic_partnership.html", name: "Strategic Partnerships" },
        { file: "question_answer.html", name: "Q & A" },
      ];

      let current = 0;
      let transitioning = false;

      // Build dot nav
      const dotsEl = document.getElementById("dots");
      SLIDES.forEach((_, i) => {
        const d = document.createElement("div");
        d.className = "dot" + (i === 0 ? " active" : "");
        d.title = SLIDES[i].name;
        d.onclick = () => goTo(i);
        dotsEl.appendChild(d);
      });

      // Scale iframe to fill viewport
      function scaleFrame() {
        const vw = document.getElementById("viewport").clientWidth;
        const vh = document.getElementById("viewport").clientHeight;
        const scaleX = vw / 1280;
        const scaleY = vh / 720;
        const scale = Math.min(scaleX, scaleY);
        const fw = document.getElementById("frameWrap");
        fw.style.width = 1280 * scale + "px";
        fw.style.height = 720 * scale + "px";
        const iframe = document.getElementById("slideFrame");
        iframe.style.transform = `scale(${scale})`;
        const overlay = document.getElementById("overlay");
        overlay.style.borderRadius = "0";
      }
      window.addEventListener("resize", scaleFrame);
      scaleFrame();

      function updateUI() {
        const total = SLIDES.length;
        // counter
        document.getElementById("counter").textContent =
          String(current + 1).padStart(2, "0") +
          " / " +
          String(total).padStart(2, "0");
        // slide name
        document.getElementById("slideName").textContent = SLIDES[current].name;
        // dots
        document
          .querySelectorAll(".dot")
          .forEach((d, i) => d.classList.toggle("active", i === current));
        // buttons
        document.getElementById("prevBtn").disabled = current === 0;
        document.getElementById("nextBtn").disabled = current === total - 1;
        document.getElementById("nextBtn").textContent = "";
        document.getElementById("nextBtn").innerHTML =
          current === total - 1
            ? 'Final Slide <svg viewBox="0 0 16 16" style="width:14px;height:14px;fill:#04030A"><path d="M6 3l5 5-5 5V3z"/></svg>'
            : 'Next Slide <svg viewBox="0 0 16 16" style="width:14px;height:14px;fill:#04030A"><path d="M6 3l5 5-5 5V3z"/></svg>';
        // progress bar
        document.getElementById("progress").style.width =
          ((current + 1) / total) * 100 + "%";
      }

      function goTo(idx) {
        if (transitioning || idx === current || idx < 0 || idx >= SLIDES.length)
          return;
        transitioning = true;
        const overlay = document.getElementById("overlay");
        overlay.classList.add("active");
        setTimeout(() => {
          current = idx;
          document.getElementById("slideFrame").src = SLIDES[current].file;
          updateUI();
          setTimeout(() => {
            overlay.classList.remove("active");
            transitioning = false;
          }, 260);
        }, 260);
      }

      function go(dir) {
        goTo(current + dir);
      }

      // Keyboard
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === " ") {
          e.preventDefault();
          go(1);
        }
        if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
          e.preventDefault();
          go(-1);
        }
        if (e.key === "f" || e.key === "F") toggleFS();
        // number keys 1-9 for quick jump
        const n = parseInt(e.key);
        if (n >= 1 && n <= 9) goTo(n - 1);
      });

      // Swipe support
      let touchX = 0;
      document.addEventListener("touchstart", (e) => {
        touchX = e.touches[0].clientX;
      });
      document.addEventListener("touchend", (e) => {
        const dx = e.changedTouches[0].clientX - touchX;
        if (Math.abs(dx) > 60) go(dx < 0 ? 1 : -1);
      });

      // Fullscreen
      function toggleFS() {
        if (!document.fullscreenElement)
          document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      }

      // Fade kb hint after 5s
      setTimeout(() => {
        document.getElementById("kbHint").style.opacity = "0";
      }, 5000);

      // Initial load
      updateUI();
      document.getElementById("slideFrame").src = SLIDES[0].file;
    </script>
  </body>
</html>
